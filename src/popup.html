<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OSShepherd for CodeRabbit Reviews</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --text: #c9d1d9; --muted: #8b949e; --faint: #484f58;
      --orange: #2d6a4f; --green: #3fb950; --red: #f85149; --blue: #58a6ff;
      --yellow: #d29922; --purple: #a371f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px; min-height: 140px; max-height: 580px;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--panel);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-title { font-weight: 600; font-size: 14px; color: #fff; }
    .header-count {
      font-size: 10px; background: #21262d; color: var(--muted);
      padding: 1px 7px; border-radius: 8px; font-weight: 600;
    }
    .options-link {
      font-size: 11px; color: var(--muted); cursor: pointer;
      background: none; border: none; padding: 2px 6px;
      border-radius: 4px; text-decoration: none;
    }
    .options-link:hover { background: #21262d; color: var(--text); }

    /* ── Summary bar ────────────────────────────────── */
    .summary-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px; border-bottom: 1px solid var(--border);
      background: var(--panel); flex-shrink: 0; font-size: 11px;
    }
    .summary-stat { display: flex; align-items: center; gap: 4px; color: var(--muted); }
    .summary-stat .num { font-weight: 700; }
    .summary-stat.critical .num { color: var(--red); }
    .summary-stat.warnings .num { color: var(--yellow); }
    .summary-stat.clean .num { color: var(--green); }
    .summary-stat.stale .num { color: var(--orange); }

    /* ── Review list ────────────────────────────────── */
    .reviews-list { overflow-y: auto; flex: 1; }

    /* Repo group */
    .repo-group { border-bottom: 1px solid var(--border); }
    .repo-group:last-child { border-bottom: none; }
    .repo-header {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px 6px; font-size: 11px; color: var(--faint);
      font-weight: 600; letter-spacing: 0.02em;
      cursor: pointer; user-select: none;
    }
    .repo-header:hover, .repo-header:focus-visible { color: var(--muted); }
    .repo-chevron {
      font-size: 9px; transition: transform 0.15s;
      display: inline-block;
    }
    .repo-group.collapsed .repo-chevron { transform: rotate(-90deg); }
    .repo-group.collapsed .repo-cards { display: none; }
    .repo-cards { padding: 0 10px 8px; }

    /* PR card */
    .pr-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .pr-card:last-child { margin-bottom: 0; }
    .pr-card:hover, .pr-card:focus-visible { border-color: var(--blue); background: #1c2333; }
    .pr-card:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }

    .pr-card-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .pr-title {
      font-size: 12px; font-weight: 600; color: #fff; line-height: 1.35;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .pr-number { color: var(--blue); font-weight: 400; }
    .pr-stale-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 6px;
      background: #3a2a1a; color: var(--orange); font-weight: 700;
      white-space: nowrap; flex-shrink: 0; margin-top: 1px;
    }

    .pr-card-meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-top: 5px; font-size: 11px; color: var(--muted);
    }
    .pr-status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-complete { background: var(--green); }
    .dot-reviewing { background: var(--blue); animation: pulse 1.5s infinite; }
    .dot-pending { background: var(--faint); }
    .dot-error { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pr-sep { color: var(--faint); }

    .pr-card-severity {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-top: 5px; font-size: 10px; font-weight: 600;
    }
    .sev-pill {
      display: flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 6px;
    }
    .sev-critical, .sev-major { background: #3a1a1a; color: var(--red); }
    .sev-high { background: #3a1a1a; color: var(--red); }
    .sev-medium { background: #3a2a1a; color: var(--orange); }
    .sev-low { background: #2d2a1a; color: var(--yellow); }
    .sev-trivial { background: #21262d; color: var(--muted); }
    .sev-lgtm { background: #1a3a2a; color: var(--green); }

    /* ── Empty state ────────────────────────────────── */
    .empty {
      padding: 36px 16px; text-align: center; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .empty-icon { font-size: 28px; }
    .empty-hint { font-size: 12px; line-height: 1.5; }

    .footer {
      padding: 6px 14px; border-top: 1px solid var(--border);
      font-size: 9px; color: var(--faint); text-align: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-title">🐑 OSShepherd for CodeRabbit Reviews</span>
      <span class="header-count" id="headerCount" style="display:none"></span>
    </div>
    <button class="options-link" id="optionsBtn">⚙ Settings</button>
  </div>
  <div class="summary-bar" id="summaryBar" style="display:none"></div>
  <div class="reviews-list" id="reviewsList">
    <div class="empty">
      <span class="empty-icon">🐑</span>
      <span>Loading…</span>
    </div>
  </div>
  <div class="footer">OSShepherd is not affiliated with, endorsed by, or sponsored by CodeRabbit, Inc. CodeRabbit™ is a trademark of CodeRabbit, Inc.</div>
  <script src="utils/utils.js"></script>
  <script src="utils/review-store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
